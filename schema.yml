components:
  schemas:
    ActionTypeEnum:
      enum:
      - add_product
      - update_product_price
      - mark_unavailable
      - other
      type: string
      description: |-
        * `add_product` - إضافة منتج جديد
        * `update_product_price` - تعديل سعر منتج
        * `mark_unavailable` - تعطيل توفر منتج
        * `other` - أخرى
    AdminNotification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        type:
          $ref: '#/components/schemas/TypeEnum'
        related_object_id:
          type: string
          maxLength: 100
        message:
          type: string
        is_read:
          type: boolean
        sent_via_telegram:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - message
      - related_object_id
      - type
    AgentActionRequest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        action_type:
          $ref: '#/components/schemas/ActionTypeEnum'
        payload: {}
        reason:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/AgentActionRequestStatusEnum'
        requested_at:
          type: string
          format: date-time
          readOnly: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
      required:
      - action_type
      - id
      - payload
      - requested_at
    AgentActionRequestStatusEnum:
      enum:
      - pending
      - approved
      - rejected
      type: string
      description: |-
        * `pending` - قيد الانتظار
        * `approved` - تمت الموافقة
        * `rejected` - مرفوض
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 120
          pattern: ^[-a-zA-Z0-9_]+$
        image:
          type: string
          format: uri
          nullable: true
      required:
      - id
      - name
      - slug
    ChatConversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        customer_identifier:
          type: string
          maxLength: 100
        customer_name:
          type: string
          nullable: true
          maxLength: 150
        status:
          $ref: '#/components/schemas/ChatConversationStatusEnum'
        is_agent_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_message_at:
          type: string
          format: date-time
          readOnly: true
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          readOnly: true
      required:
      - created_at
      - customer_identifier
      - id
      - last_message_at
      - messages
    ChatConversationStatusEnum:
      enum:
      - open
      - needs_admin
      - closed
      type: string
      description: |-
        * `open` - Open
        * `needs_admin` - Needs Admin
        * `closed` - Closed
    ChatMessage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        sender_type:
          $ref: '#/components/schemas/SenderTypeEnum'
        content:
          type: string
        timestamp:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - id
      - sender_type
      - timestamp
    Commission:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        is_settled:
          type: boolean
        settled_at:
          type: string
          format: date-time
          nullable: true
        order:
          type: string
          format: uuid
      required:
      - amount
      - id
      - order
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        order_number:
          type: string
          readOnly: true
        customer_name:
          type: string
          maxLength: 150
        customer_phone:
          type: string
          maxLength: 20
        customer_governorate:
          type: string
          maxLength: 100
        customer_address:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/OrderStatusEnum'
          readOnly: true
        shipping_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
      required:
      - created_at
      - customer_address
      - customer_governorate
      - customer_name
      - customer_phone
      - id
      - items
      - order_number
      - shipping_price
      - status
      - total_price
    OrderItem:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        product_title:
          type: string
          readOnly: true
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
        price_at_order_time:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - price_at_order_time
      - product_id
      - product_title
    OrderStatusEnum:
      enum:
      - pending_review
      - supplier_confirmed
      - out_for_delivery
      - delivered
      - commission_settled
      - cancelled
      type: string
      description: |-
        * `pending_review` - قيد المراجعة
        * `supplier_confirmed` - تم التأكيد
        * `out_for_delivery` - جاري التوصيل
        * `delivered` - تم التسليم
        * `commission_settled` - تمت تسوية العمولة
        * `cancelled` - ملغي
    PaginatedProductList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Product'
    PatchedAdminNotification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        type:
          $ref: '#/components/schemas/TypeEnum'
        related_object_id:
          type: string
          maxLength: 100
        message:
          type: string
        is_read:
          type: boolean
        sent_via_telegram:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
    PatchedAgentActionRequest:
